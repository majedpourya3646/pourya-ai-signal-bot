name: CoinEx Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run CoinEx Test
        env:
          COINEX_API_KEY: ${{ secrets.COINEX_API_KEY }}
          COINEX_API_SECRET: ${{ secrets.COINEX_API_SECRET }}
        run: |
          python test_coinex.py
